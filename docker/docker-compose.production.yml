# NoralOS production deploy — image-based with Watchtower auto-pull.
#
# Differs from docker-compose.yml (which uses `build:` for dev/CI builds):
#   - server pulls a pre-built image from GHCR (no local build needed)
#   - includes a Watchtower service that polls GHCR every 5 min for new
#     images and restarts the server container when one lands
#
# Required env vars (read from .env in the same directory as this file):
#   BETTER_AUTH_SECRET          random 32-byte secret
#   NORALOS_PUBLIC_URL          https://agent.noral.ai (no trailing slash)
#   POSTGRES_PASSWORD           random secret for the in-cluster Postgres
#
# Deploy flow on the VPS:
#   1. cd /opt/noralos
#   2. docker compose pull
#   3. docker compose up -d
#
# Image tag pinning:
#   Default uses :latest. To pin to a specific release, set NORALOS_IMAGE_TAG
#   in .env (e.g. NORALOS_IMAGE_TAG=v2026.428.0 or NORALOS_IMAGE_TAG=sha-a84522b).

services:
  db:
    image: postgres:17-alpine
    container_name: noralos-db
    environment:
      POSTGRES_USER: noralos
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}"
      POSTGRES_DB: noralos
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noralos -d noralos"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - noralos
    restart: unless-stopped
    labels:
      # Watchtower: don't auto-update Postgres. Major version bumps need
      # manual data-dir migration; auto-pull would be reckless.
      com.centurylinklabs.watchtower.enable: "false"

  server:
    image: ghcr.io/noral-ai/noralos:${NORALOS_IMAGE_TAG:-latest}
    container_name: noralos-server
    pull_policy: always
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: "postgres://noralos:${POSTGRES_PASSWORD}@db:5432/noralos"
      PORT: "3100"
      SERVE_UI: "true"
      NORALOS_DEPLOYMENT_MODE: "authenticated"
      NORALOS_DEPLOYMENT_EXPOSURE: "public"
      NORALOS_PUBLIC_URL: "${NORALOS_PUBLIC_URL:?NORALOS_PUBLIC_URL must be set}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
    volumes:
      # Volume name kept as `paperclip-data` for migration safety from
      # legacy deploys that already have data persisted under that name.
      # Mount path changed to /noralos in Phase 4 of the rebrand.
      - paperclip-data:/noralos
    networks:
      - noralos
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # Hits the server's /api/health route. NoralOS returns
      # {"status":"ok",...} when the app is up.
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/api/health | grep -q '\"status\":\"ok\"' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s
    restart: unless-stopped
    labels:
      # Watchtower: pull new images and restart on label match.
      com.centurylinklabs.watchtower.enable: "true"

  watchtower:
    # Pinned to 1.7.1 — :latest has shipped clients that fail against
    # bleeding-edge Docker daemons (e.g. Ubuntu 25.10's docker package
    # rejects API 1.25). 1.7.1 negotiates 1.41+ which works on every
    # daemon released in the past 5+ years.
    image: containrrr/watchtower:1.7.1
    container_name: noralos-watchtower
    volumes:
      # Required: lets Watchtower issue Docker commands (pull, stop, start).
      - /var/run/docker.sock:/var/run/docker.sock
      # NOTE: the previous version of this file bind-mounted
      # ${HOME}/.docker/config.json:/config.json:ro for private GHCR auth.
      # That mount is removed because (a) the GHCR package is public so
      # no auth is needed, and (b) Docker silently creates a *directory*
      # at the source path when the file doesn't exist, which then can't
      # be parsed as JSON. If you switch the GHCR package back to private,
      # add the mount back AND make sure the source is a real file:
      #   echo '{}' > /root/.docker/config.json
      #   chmod 600 /root/.docker/config.json
      #   docker login ghcr.io -u <user> --password-stdin <<< "$YOUR_PAT"
    environment:
      # Force a modern Docker API version for the SDK negotiation. Defends
      # against host daemons that have dropped support for older API levels.
      DOCKER_API_VERSION: "1.45"
      # Only watch containers explicitly opted in via the
      # com.centurylinklabs.watchtower.enable=true label.
      WATCHTOWER_LABEL_ENABLE: "true"
      # Poll interval: 5 minutes. Lower = faster post-merge rollouts;
      # higher = fewer GHCR API calls. 5 min is the typical sweet spot.
      WATCHTOWER_POLL_INTERVAL: "300"
      # Remove old images after a successful pull-and-restart.
      WATCHTOWER_CLEANUP: "true"
      # Optional: notification webhook (Slack/Discord/email). Off by default.
      # WATCHTOWER_NOTIFICATION_URL: "..."
    networks:
      - noralos
    restart: unless-stopped
    labels:
      # Watchtower should not try to update itself in a running cycle.
      com.centurylinklabs.watchtower.enable: "false"

# Explicit network. Avoids a class of bug where the project's default
# network collides with a stale one from a previous deploy and breaks
# embedded DNS for service names like `db`.
networks:
  noralos:
    name: noralos
    driver: bridge

volumes:
  pgdata:
  paperclip-data:
